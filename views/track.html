<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Suggestion - Online Suggestion Box</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .track-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .track-box {
      background: white;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .track-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .track-header h1 {
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .track-form {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .track-form input {
      flex: 1;
      padding: 10px 15px;
      border: 2px solid var(--border-color);
      border-radius: 4px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .track-form button {
      padding: 10px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .track-form button:hover {
      background: #1e40af;
    }

    .suggestion-result {
      display: none;
    }

    .status-card {
      background: #f8fafc;
      border-left: 4px solid var(--primary-color);
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .status-badge.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-badge.under-review {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-badge.resolved {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.rejected {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .suggestion-detail {
      margin-bottom: 20px;
    }

    .detail-label {
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .detail-value {
      color: var(--text-dark);
      line-height: 1.6;
    }

    .admin-response-box {
      background: #e0f2fe;
      border-left: 4px solid var(--success-color);
      padding: 15px;
      border-radius: 4px;
      margin-top: 15px;
    }

    .admin-response-box .detail-label {
      color: var(--success-color);
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 15px;
      border-radius: 4px;
      display: none;
      margin-bottom: 20px;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      border: 4px solid #f3f4f6;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state p {
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="track-page">
  <div class="container">
    <div class="track-container">
      <div class="track-box">
        <div class="track-header">
          <h1>Track Your Suggestion</h1>
          <p>Check the status of your suggestion using the tracking code you received</p>
        </div>

        <form class="track-form" id="trackForm">
          <input 
            type="text" 
            id="codeInput" 
            placeholder="Enter your tracking code"
            autocomplete="off"
            required
          >
          <button type="submit">Search</button>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner"></div>
          <p>Searching...</p>
        </div>

        <div class="suggestion-result" id="suggestionResult">
          <div class="status-card">
            <div class="status-badge" id="statusBadge"></div>
            
            <div class="suggestion-detail">
              <div class="detail-label">Title</div>
              <div class="detail-value" id="detailTitle"></div>
            </div>

            <div class="suggestion-detail">
              <div class="detail-label">Message</div>
              <div class="detail-value" id="detailMessage"></div>
            </div>

            <div class="suggestion-detail">
              <div class="detail-label">Area</div>
              <div class="detail-value" id="detailArea"></div>
            </div>

            <div class="suggestion-detail">
              <div class="detail-label">Location</div>
              <div class="detail-value" id="detailLocation"></div>
            </div>

            <div class="suggestion-detail">
              <div class="detail-label">Submitted On</div>
              <div class="detail-value" id="detailDate"></div>
            </div>

            <div id="adminResponseContainer" class="admin-response-box" style="display: none;">
              <div class="detail-label">Admin Response</div>
              <div class="detail-value" id="detailResponse"></div>
              <div class="detail-label" style="margin-top: 10px;">Response Date</div>
              <div class="detail-value" id="detailResponseDate"></div>
            </div>
          </div>

          <a href="/" class="back-link">← Submit Another Suggestion</a>
        </div>

        <div class="empty-state" id="emptyState">
          <p>📝 Enter your tracking code above to view your suggestion status</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('trackForm');
    const codeInput = document.getElementById('codeInput');
    const errorMessage = document.getElementById('errorMessage');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const suggestionResult = document.getElementById('suggestionResult');
    const emptyState = document.getElementById('emptyState');

    // Check URL for code parameter
    const params = new URLSearchParams(window.location.search);
    const urlCode = params.get('code');
    if (urlCode) {
      codeInput.value = urlCode;
      searchSuggestion(urlCode);
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const code = codeInput.value.trim().toUpperCase();
      if (code) {
        searchSuggestion(code);
      }
    });

    async function searchSuggestion(code) {
      // Reset messages
      errorMessage.style.display = 'none';
      suggestionResult.style.display = 'none';
      emptyState.style.display = 'none';
      loadingSpinner.style.display = 'block';

      try {
        const response = await fetch(`/api/suggestions/track/${code}`);
        const data = await response.json();

        loadingSpinner.style.display = 'none';

        if (response.ok && data.success) {
          const suggestion = data.suggestion;

          // Update status badge
          const statusBadge = document.getElementById('statusBadge');
          statusBadge.textContent = suggestion.status;
          statusBadge.className = 'status-badge ' + suggestion.status.toLowerCase().replace(' ', '-');

          // Update details
          document.getElementById('detailTitle').textContent = suggestion.title;
          document.getElementById('detailMessage').textContent = suggestion.message;
          document.getElementById('detailArea').textContent = suggestion.area;
          document.getElementById('detailLocation').textContent = `Floor ${suggestion.floor}, Wing ${suggestion.wing}`;
          document.getElementById('detailDate').textContent = formatDate(suggestion.submittedAt);

          // Show admin response if available
          const responseContainer = document.getElementById('adminResponseContainer');
          if (suggestion.adminResponse) {
            document.getElementById('detailResponse').textContent = suggestion.adminResponse;
            document.getElementById('detailResponseDate').textContent = formatDate(suggestion.responseDate);
            responseContainer.style.display = 'block';
          } else {
            responseContainer.style.display = 'none';
          }

          suggestionResult.style.display = 'block';
        } else {
          errorMessage.textContent = '❌ Tracking code not found. Please check and try again.';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
        loadingSpinner.style.display = 'none';
        errorMessage.textContent = '❌ Error searching suggestion. Please try again.';
        errorMessage.style.display = 'block';
      }
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
