<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Online Suggestion Box</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="admin-login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Admin Panel</h1>
        <p>College Suggestion Box Management</p>
      </div>

      <form id="adminLoginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <span class="btn-text">Login</span>
          <span class="btn-loader" style="display: none;">Logging in...</span>
        </button>

        <div id="loginError" class="alert alert-error" style="display: none;">
          <p id="errorText"></p>
        </div>
      </form>

      <div class="link-group" style="text-align: center; margin-top: 20px;">
        <a href="/" class="back-link">← Back to Suggestion Form</a>
      </div>
    </div>
  </div>

  <script src="/js/admin-login.js"></script>
</body>
</html>
